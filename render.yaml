services:
  - type: web
    name: brain-tumor-class-api
    env: python
    rootDir: BrainTumorClass
    plan: starter
    buildCommand: pip install -r requirements.txt && python download_models.py
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT --workers 1 --timeout 180
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ADVANCED_AUTOENCODER_URL
        sync: false
      - key: ADVANCED_AUTOENCODER_SHA256
        sync: false
